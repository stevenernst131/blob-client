version: 1
platform: nodejs
platformVersion: "24"
run:
  port: 3000
  startCommand: node server.js

dependencies:
  - name: "per-env-key"
    envVar: "PER_ENV_KEY"
    description: "Third-party API key"
    required: true
    isSecret: true
  - name: "shared-key"
    envVar: "SHARED_KEY"
    description: "Third-party API key"
    required: true
    isSecret: true
