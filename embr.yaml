version: 1
platform: nodejs
platformVersion: "24"
run:
  port: 3000
  startCommand: node server.js

dependencies:
  per-env-key:
    type: external
    description: "Third-party API key"
    required: true
    provides:
      - name: PER_ENV_KEY
        secret: true
  shared-key:
    type: external
    description: "Third-party API key"
    required: true
    provides:
      - name: SHARED_KEY
        secret: true